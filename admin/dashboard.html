<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard Analitik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">📊 Dashboard Admin</h1>
        <div class="flex items-center gap-4">
            <span id="welcomeMessage" class="text-sm text-gray-300"></span>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm transition">Logout</button>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <div class="bg-blue-600 rounded-[2.5rem] p-6 text-white shadow-xl flex flex-col justify-between hover:scale-105 transition-transform">
        <p class="text-blue-200 font-bold uppercase text-[10px] tracking-widest">Omzet Hari Ini</p>
        <h2 id="omzetHarian" class="text-3xl font-black">Rp 0</h2>
    </div>

    <div class="bg-indigo-600 rounded-[2.5rem] p-6 text-white shadow-xl flex flex-col justify-between hover:scale-105 transition-transform">
        <p class="text-indigo-200 font-bold uppercase text-[10px] tracking-widest">Omzet Bulan Ini</p>
        <h2 id="omzetBulanan" class="text-3xl font-black">Rp 0</h2>
    </div>
    
    <div class="bg-amber-500 rounded-[2.5rem] p-6 text-white shadow-lg flex flex-col justify-between">
        <p class="text-amber-100 font-bold text-[10px] uppercase tracking-widest">Pengeluaran Hari Ini</p>
        <h3 id="expHarian" class="text-2xl font-black">Rp 0</h3>
    </div>
    
    <div class="bg-slate-800 rounded-[2.5rem] p-6 text-white shadow-lg flex flex-col justify-between">
        <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Pengeluaran Bulan Ini</p>
        <h3 id="expBulanan" class="text-2xl font-black">Rp 0</h3>
    </div>
</div>

<div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 mt-6">
    <h2 class="font-black text-red-600 mb-4 flex items-center gap-2">
        <i data-lucide="alert-triangle"></i> Peringatan Stok Menipis (< 10)
    </h2>
    <ul id="lowStockList" class="divide-y divide-slate-100">
        <li class="py-4 text-center text-slate-400">Memuat data stok...</li>
    </ul>
</div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <h2 class="font-black text-slate-700 mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="text-blue-500"></i> Cashflow Harian
                </h2>
                <canvas id="cashflowBarChart"></canvas>
            </div>
            
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <h2 class="font-black text-slate-700 mb-4 flex items-center gap-2">
                    <i data-lucide="trending-up" class="text-emerald-500"></i> Tren Laba
                </h2>
                <canvas id="labaLineChart"></canvas>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col items-center">
                <h2 class="font-black text-slate-700 mb-4 w-full text-left flex items-center gap-2">
                    <i data-lucide="pie-chart" class="text-amber-500"></i> Rasio Keuangan
                </h2>
                <div class="w-[200px] h-[200px]">
                    <canvas id="financeDonutChart"></canvas>
                </div>
                <p class="text-[10px] font-bold text-slate-400 mt-4 uppercase">Laba vs Pengeluaran</p>
            </div>
        </div>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="admin.js"></script>
</body>
</html>

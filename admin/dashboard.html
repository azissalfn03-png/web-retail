<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard Analitik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">📊 Dashboard Admin</h1>
        <div class="flex items-center gap-4">
            <span id="welcomeMessage" class="text-sm text-gray-300"></span>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm transition">Logout</button>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-400">
                <p class="text-gray-500 text-xs font-bold uppercase">Omzet Hari Ini</p>
                <h3 id="omzetHarian" class="text-xl font-bold text-gray-800 mt-1">Memuat...</h3>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Omzet Minggu Ini</p>
                <h3 id="omzetMingguan" class="text-xl font-bold text-gray-800 mt-1">Memuat...</h3>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-600">
                <p class="text-gray-500 text-xs font-bold uppercase">Omzet Bulan Ini</p>
                <h3 id="omzetBulanan" class="text-xl font-bold text-gray-800 mt-1">Memuat...</h3>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Total Laba Keseluruhan</p>
                <h3 id="totalLaba" class="text-xl font-bold text-green-600 mt-1">Memuat...</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold text-gray-700 mb-4">Grafik Laba Harian</h2>
                <div class="relative h-72 w-full">
                    <canvas id="labaChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold text-red-600 flex items-center gap-2 mb-4">
                    ⚠️ Peringatan Stok (< 10)
                </h2>
                <div class="overflow-y-auto h-72">
                    <ul id="lowStockList" class="divide-y divide-gray-200">
                        <li class="py-2 text-center text-sm text-gray-500">Memuat data...</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="admin.js"></script>
</body>
</html>

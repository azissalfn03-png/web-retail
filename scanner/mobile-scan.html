<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

    <header class="bg-gray-800 p-4 text-center shadow-lg">
        <h1 class="text-xl font-bold text-green-400">📷 Barcode Scanner</h1>
        <button onclick="logout()" class="text-sm text-gray-400 underline mt-1">Logout</button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 space-y-6">
        
        <div class="w-full max-w-sm bg-gray-800 p-4 rounded-lg shadow">
            <label class="block text-sm text-gray-300 mb-2">Masukkan Session ID (dari PC):</label>
            <input type="text" id="sessionIdInput" placeholder="Contoh: GDG-1234" class="w-full p-3 rounded bg-gray-700 text-white text-center font-mono text-xl tracking-widest border border-gray-600 focus:outline-none focus:border-green-500 uppercase">
        </div>

        <div class="w-full max-w-sm bg-black rounded-lg overflow-hidden border-2 border-gray-700">
            <div id="reader" width="100%"></div>
        </div>

        <p id="statusText" class="text-sm text-gray-400 text-center">Arahkan kamera ke barcode/QR Code produk.</p>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
